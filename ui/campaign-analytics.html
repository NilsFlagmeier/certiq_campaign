<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex,nofollow,noarchive" />
  <title>Certiq Kampagnen-Analyse</title>
  <link rel="stylesheet" href="/admin/shared.css" />
</head>
<body>
  <div class="pageLoader" id="pageLoader" aria-hidden="true"><div class="pageLoaderBar"></div></div>
  <div class="wrap wide" id="navMount"></div>
  <div class="wrap wide">
    <section class="panel">
      <h2>UTM-Filter</h2>
      <label class="field">Tracking-URL
        <input id="trackingUrlInput" type="url" placeholder="https://certiq.tech/?user_id=…&utm_campaign=…" />
      </label>
      <div class="actions" style="margin-top:0">
        <button id="parseUrlBtn" type="button">URL übernehmen</button>
      </div>
      <div class="stats" style="margin-top:12px">
        <label class="field" style="flex:1;min-width:140px">utm_source<input id="utmSourceInput" value="newsletter" /></label>
        <label class="field" style="flex:1;min-width:140px">utm_medium<input id="utmMediumInput" value="email" /></label>
        <label class="field" style="flex:1;min-width:180px">utm_campaign<input id="utmCampaignInput" value="business_card_intro" /></label>
      </div>
      <div class="stats">
        <label class="field" style="flex:1;min-width:120px">utm_content<input id="utmContentInput" placeholder="optional" /></label>
        <label class="field" style="flex:1;min-width:120px">utm_term<input id="utmTermInput" placeholder="optional" /></label>
        <label class="field" style="flex:1;min-width:140px">user_id<input id="userIdInput" placeholder="optional" /></label>
      </div>
      <p class="muted">Clarity: max. 10 API-Requests/Tag — manuelle Abfrage verbraucht 2 Requests.</p>
      <div class="actions">
        <button id="loadBtn" type="button" class="btn primary">Analyse laden</button>
        <button id="clarityBtn" type="button">Clarity abfragen</button>
        <button id="syncResendBtn" type="button">Resend → Store</button>
        <button id="syncTwentyBtn" type="button">Store → Twenty</button>
      </div>
      <p class="muted" id="loadStatus" hidden></p>
    </section>
    <div class="stats" id="kpiRow"></div>
    <div class="stats" id="segmentRow"></div>
    <section class="panel">
      <h2>Follow-up jetzt</h2>
      <table class="data" id="followUpTable"><thead><tr><th>Name</th><th>E-Mail</th><th>Segment</th><th>Score</th><th>Empfehlung</th></tr></thead><tbody></tbody></table>
    </section>
    <section class="panel">
      <h2>Top-Interesse</h2>
      <table class="data" id="topTable"><thead><tr><th>Name</th><th>E-Mail</th><th>Score</th><th>Opens</th><th>Clicks</th><th>Clarity</th></tr></thead><tbody></tbody></table>
    </section>
    <section class="panel">
      <h2>Alle Leads</h2>
      <table class="data" id="allTable"><thead><tr><th>Name</th><th>Firma</th><th>Segment</th><th>Score</th><th>Events</th><th>Clarity</th><th>Empfehlung</th></tr></thead><tbody></tbody></table>
    </section>
    <section class="panel">
      <h2>Verhalten-Leitfaden</h2>
      <div id="guideBox"></div>
    </section>
    <details class="detailsBlock panel"><summary>Debug JSON</summary><pre class="debug" id="debugOut"></pre></details>
  </div>
  <script src="/admin/shared.js"></script>
  <script>
    document.getElementById("navMount").innerHTML = adminNav("/admin/campaign/analytics");
    bindLogout();
    let report = null;
    let segmentFilter = "";

    const FILTER_FIELDS = [
      { id: "utmSourceInput", key: "utm_source" },
      { id: "utmMediumInput", key: "utm_medium" },
      { id: "utmCampaignInput", key: "utm_campaign" },
      { id: "utmContentInput", key: "utm_content" },
      { id: "utmTermInput", key: "utm_term" },
      { id: "userIdInput", key: "user_id" },
    ];

    function parseTrackingUrl(url) {
      const raw = (url || "").trim();
      if (!raw) return {};
      const normalized = raw.includes("://") ? raw : `https://placeholder.local/${raw.replace(/^\//, "")}`;
      const params = new URL(normalized).searchParams;
      const out = {};
      FILTER_FIELDS.forEach(({ key }) => {
        const value = (params.get(key) || "").trim();
        if (value) out[key] = value;
      });
      return out;
    }

    function readFilters() {
      const filters = {};
      FILTER_FIELDS.forEach(({ id, key }) => {
        const value = document.getElementById(id).value.trim();
        if (value) filters[key] = value;
      });
      return filters;
    }

    function writeFilters(filters) {
      FILTER_FIELDS.forEach(({ id, key }) => {
        const el = document.getElementById(id);
        if (!el) return;
        if (filters[key] != null) el.value = filters[key];
      });
    }

    function filtersFromLocation() {
      const params = new URLSearchParams(window.location.search);
      const filters = {};
      FILTER_FIELDS.forEach(({ key }) => {
        const value = (params.get(key) || "").trim();
        if (value) filters[key] = value;
      });
      return filters;
    }

    function syncLocation(filters) {
      const params = new URLSearchParams();
      Object.entries(filters).forEach(([key, value]) => {
        if (value) params.set(key, value);
      });
      const next = `${window.location.pathname}${params.toString() ? `?${params.toString()}` : ""}`;
      window.history.replaceState(null, "", next);
    }

    function buildAnalyticsQuery(filters, fetchClarity) {
      const params = new URLSearchParams();
      Object.entries(filters).forEach(([key, value]) => {
        if (value) params.set(key, value);
      });
      if (fetchClarity) params.set("fetch_clarity", "1");
      const query = params.toString();
      return query ? `?${query}` : "";
    }

    function tableLoadingRow(colspan, text) {
      return `<tr><td colspan="${colspan}" class="tableLoading"><span class="spinner sm" aria-hidden="true"></span>${escapeHtml(text)}</td></tr>`;
    }

    function setAnalyticsLoading(loading, statusText) {
      setPageLoading(loading);
      const loadBtn = document.getElementById("loadBtn");
      const clarityBtn = document.getElementById("clarityBtn");
      const syncResendBtn = document.getElementById("syncResendBtn");
      const syncTwentyBtn = document.getElementById("syncTwentyBtn");
      const statusEl = document.getElementById("loadStatus");

      loadBtn.disabled = loading;
      clarityBtn.disabled = loading;
      syncResendBtn.disabled = loading;
      syncTwentyBtn.disabled = loading;
      loadBtn.textContent = loading ? "Lädt …" : "Analyse laden";
      clarityBtn.textContent = loading ? "Clarity lädt …" : "Clarity abfragen";

      if (loading && statusText) {
        statusEl.hidden = false;
        statusEl.textContent = statusText;
      }

      if (!loading) return;

      const chip = '<span class="statChip loading"><span class="spinner sm" aria-hidden="true"></span> Lädt …</span>';
      document.getElementById("kpiRow").innerHTML = chip.repeat(6);
      document.getElementById("segmentRow").innerHTML = chip.repeat(4);
      document.querySelector("#followUpTable tbody").innerHTML = tableLoadingRow(5, "Follow-up-Leads werden geladen …");
      document.querySelector("#topTable tbody").innerHTML = tableLoadingRow(6, "Top-Interesse wird berechnet …");
      document.querySelector("#allTable tbody").innerHTML = tableLoadingRow(7, "Alle Leads werden aggregiert …");
      document.getElementById("guideBox").innerHTML = '<p class="muted"><span class="spinner sm" aria-hidden="true"></span> Verhalten-Leitfaden wird vorbereitet …</p>';
    }

    function renderKpis(kpis) {
      const items = [
        ["Gesendet", kpis.sent], ["Geöffnet", kpis.opened], ["Geklickt", kpis.clicked],
        ["Bounced", kpis.bounced], ["Abgemeldet", kpis.unsubscribed], ["Beschwerde", kpis.complained],
      ];
      document.getElementById("kpiRow").innerHTML = items.map(([l, v]) =>
        `<span class="statChip">${l} <strong>${v ?? 0}</strong></span>`).join("");
    }

    function renderSegments(segments) {
      const chips = Object.entries(segments || {}).map(([k, v]) =>
        `<span class="statChip clickable badge ${k} ${segmentFilter === k ? "active" : ""}" data-seg="${k}">${SEGMENT_LABELS[k] || k} <strong>${v}</strong></span>`).join("");
      document.getElementById("segmentRow").innerHTML = chips + `<span class="statChip clickable" data-seg="">Alle</span>`;
      document.querySelectorAll("[data-seg]").forEach((el) => {
        el.addEventListener("click", () => {
          segmentFilter = el.getAttribute("data-seg") || "";
          renderTables(report);
          renderSegments(report.segments);
        });
      });
    }

    function leadName(r) { return `${r.firstName || ""} ${r.lastName || ""}`.trim() || "—"; }
    function filteredLeads(list) {
      if (!segmentFilter) return list;
      return (list || []).filter((r) => r.segment === segmentFilter);
    }

    function renderTables(r) {
      if (!r) return;
      const all = filteredLeads(r.leads);
      const followUp = (r.followUpNow || []).filter((x) => !segmentFilter || x.segment === segmentFilter);
      const top = (r.topInterest || []).filter((x) => !segmentFilter || x.segment === segmentFilter);

      document.querySelector("#followUpTable tbody").innerHTML = followUp.length
        ? followUp.map((row) => `<tr><td>${escapeHtml(leadName(row))}</td><td>${escapeHtml(row.email)}</td><td><span class="badge ${row.segment}">${SEGMENT_LABELS[row.segment] || row.segment}</span></td><td>${row.score}</td><td>${escapeHtml(row.recommendation || "")}</td></tr>`).join("")
        : tableLoadingRow(5, "Keine Follow-ups für diesen Filter.");
      document.querySelector("#topTable tbody").innerHTML = top.length
        ? top.map((row) => `<tr><td>${escapeHtml(leadName(row))}</td><td>${escapeHtml(row.email)}</td><td>${row.score}</td><td>${row.events?.["resend.opened"] || 0}</td><td>${row.events?.["resend.clicked"] || 0}</td><td>${row.claritySessions || 0}</td></tr>`).join("")
        : tableLoadingRow(6, "Keine Top-Interesse-Leads für diesen Filter.");
      document.querySelector("#allTable tbody").innerHTML = all.length
        ? all.map((row) =>
          `<tr><td>${escapeHtml(leadName(row))}</td><td>${escapeHtml(row.company || "")}</td><td><span class="badge ${row.segment}">${SEGMENT_LABELS[row.segment] || row.segment}</span></td><td>${row.score}</td><td>${escapeHtml(JSON.stringify(row.events || {}))}</td><td>${row.claritySessions || 0}</td><td>${escapeHtml(row.recommendation || "")}</td></tr>`).join("")
        : tableLoadingRow(7, "Keine Leads für diesen Filter.");
      document.getElementById("guideBox").innerHTML = (r.behaviorGuide || BEHAVIOR_GUIDE).map((g) =>
        `<p><strong>${SEGMENT_LABELS[g.segment] || g.segment}:</strong> ${escapeHtml(g.text)}</p>`).join("");
    }

    function formatStatusText(filters, fetchClarity, body) {
      const updated = new Date().toLocaleString("de-DE");
      const filterParts = Object.entries(filters).map(([k, v]) => `${k}=${v}`);
      const filterText = filterParts.length ? filterParts.join(", ") : "keine Filter";
      let text = `Zuletzt geladen: ${updated} — Filter: ${filterText}`;
      if (fetchClarity && body?.report?.clarity?.fetched) {
        const clarity = body.report.clarity;
        const fetchedAt = clarity.fetchedAt ? new Date(clarity.fetchedAt).toLocaleString("de-DE") : updated;
        const urlSessions = clarity.totals?.urlSessions ?? 0;
        text += ` — Clarity geladen: ${fetchedAt}, ${clarity.apiCalls || 0} Requests, ${urlSessions} URL-Sessions`;
        if (clarity.error) text += ` — Hinweis: ${clarity.error}`;
      }
      return text;
    }

    async function loadAnalytics({ fetchClarity = false } = {}) {
      const filters = readFilters();
      syncLocation(filters);
      const query = buildAnalyticsQuery(filters, fetchClarity);
      const campaign = filters.utm_campaign || "";
      setAnalyticsLoading(true, fetchClarity
        ? "Clarity wird abgefragt (2 API-Requests) …"
        : campaign
          ? `Lade Analyse für „${campaign}" …`
          : "Lade Kampagnen-Analyse …");
      try {
        const result = await callApi(`/api/admin/campaign/analytics${query}`);
        if (!result) return;
        report = result.body.report || {};
        document.getElementById("debugOut").textContent = JSON.stringify(result.body, null, 2);
        renderKpis(report.kpis || {});
        renderSegments(report.segments || {});
        renderTables(report);
        const statusEl = document.getElementById("loadStatus");
        statusEl.hidden = false;
        statusEl.textContent = formatStatusText(filters, fetchClarity, result.body);
      } finally {
        setAnalyticsLoading(false);
      }
    }

    document.getElementById("parseUrlBtn").addEventListener("click", () => {
      const parsed = parseTrackingUrl(document.getElementById("trackingUrlInput").value);
      if (!Object.keys(parsed).length) {
        showToast("Keine UTM-Parameter in der URL gefunden");
        return;
      }
      writeFilters(parsed);
      showToast("UTM-Parameter übernommen");
    });

    document.getElementById("loadBtn").addEventListener("click", () => loadAnalytics({ fetchClarity: false }));
    document.getElementById("clarityBtn").addEventListener("click", () => loadAnalytics({ fetchClarity: true }));
    document.getElementById("syncResendBtn").addEventListener("click", async () => {
      const btn = document.getElementById("syncResendBtn");
      btn.disabled = true;
      btn.textContent = "Sync läuft …";
      setPageLoading(true);
      try {
        const result = await callApi("/api/admin/campaign/analytics/sync", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ limit: 200 }),
        });
        if (result) {
          showToast("Resend-Sync abgeschlossen");
          document.getElementById("debugOut").textContent = JSON.stringify(result.body, null, 2);
          await loadAnalytics({ fetchClarity: false });
        }
      } finally {
        btn.disabled = false;
        btn.textContent = "Resend → Store";
        setPageLoading(false);
      }
    });
    document.getElementById("syncTwentyBtn").addEventListener("click", async () => {
      const btn = document.getElementById("syncTwentyBtn");
      btn.disabled = true;
      btn.textContent = "Sync läuft …";
      setPageLoading(true);
      try {
        const result = await callApi("/api/admin/campaign/sync-last-contact", { method: "POST" });
        if (result) {
          showToast("Twenty-Sync abgeschlossen");
          document.getElementById("debugOut").textContent = JSON.stringify(result.body, null, 2);
        }
      } finally {
        btn.disabled = false;
        btn.textContent = "Store → Twenty";
        setPageLoading(false);
      }
    });

    const locationFilters = filtersFromLocation();
    if (Object.keys(locationFilters).length) writeFilters(locationFilters);
    loadAnalytics({ fetchClarity: false });
  </script>
</body>
</html>
